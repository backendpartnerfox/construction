<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Construction BE - Interactive Test Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      background: #0f0f0f;
      color: #fff;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 0;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.05) 10px,
        rgba(255,255,255,0.05) 20px
      );
      animation: slide 20s linear infinite;
    }
    @keyframes slide {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }
    h1 { 
      font-size: 3em; 
      margin-bottom: 10px; 
      position: relative; 
      z-index: 1;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .subtitle { 
      color: #f0f0f0; 
      font-size: 1.2em; 
      position: relative; 
      z-index: 1;
    }
    .controls {
      background: #1a1a1a;
      padding: 25px;
      margin: 30px 0;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      border: 1px solid #333;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }
    button:hover::before {
      width: 300px;
      height: 300px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      background: #4a4a4a;
      cursor: not-allowed;
    }
    .status {
      flex: 1;
      text-align: right;
      font-weight: bold;
      font-size: 1.1em;
      color: #667eea;
    }
    .tests-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      margin-top: 30px;
      max-height: 70vh;
      overflow-y: auto;
      padding: 10px;
    }
    .tests-grid::-webkit-scrollbar {
      width: 10px;
    }
    .tests-grid::-webkit-scrollbar-track {
      background: #1a1a1a;
      border-radius: 5px;
    }
    .tests-grid::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 5px;
    }
    .tests-grid::-webkit-scrollbar-thumb:hover {
      background: #764ba2;
    }
    .test-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: all 0.3s;
      border: 1px solid #333;
      position: relative;
      overflow: hidden;
    }
    .test-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .test-card:hover::before {
      transform: scaleX(1);
    }
    .test-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
      border-color: #667eea;
    }
    .test-card h3 {
      color: #fff;
      margin-bottom: 15px;
      font-size: 1.3em;
      text-transform: capitalize;
    }
    .test-status {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 25px;
      font-size: 0.9em;
      font-weight: bold;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-pending { 
      background: rgba(243, 156, 18, 0.2); 
      color: #f39c12;
      border: 1px solid #f39c12;
    }
    .status-running { 
      background: rgba(52, 152, 219, 0.2); 
      color: #3498db;
      border: 1px solid #3498db;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .status-passed { 
      background: rgba(39, 174, 96, 0.2); 
      color: #27ae60;
      border: 1px solid #27ae60;
    }
    .status-failed { 
      background: rgba(231, 76, 60, 0.2); 
      color: #e74c3c;
      border: 1px solid #e74c3c;
    }
    .test-details {
      margin-top: 15px;
      font-size: 0.95em;
      color: #999;
      line-height: 1.5;
    }
    .progress-bar {
      width: 100%;
      height: 30px;
      background: #1a1a1a;
      border-radius: 15px;
      overflow: hidden;
      margin: 30px 0;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
      border: 1px solid #333;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 0.9em;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
    .summary {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin: 30px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 30px;
      text-align: center;
      border: 1px solid #333;
    }
    .summary-item {
      position: relative;
    }
    .summary-item::after {
      content: '';
      position: absolute;
      right: -15px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 60%;
      background: #333;
    }
    .summary-item:last-child::after {
      display: none;
    }
    .summary-item h4 {
      color: #999;
      font-size: 0.95em;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .summary-item .count {
      font-size: 2.5em;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .filter-section {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin: 30px 0;
      border: 1px solid #333;
    }
    .filter-section input {
      width: 100%;
      padding: 15px;
      border: 2px solid #333;
      border-radius: 8px;
      font-size: 16px;
      background: #0f0f0f;
      color: #fff;
      transition: border-color 0.3s;
    }
    .filter-section input:focus {
      outline: none;
      border-color: #667eea;
    }
    .error-details {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid #e74c3c;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85em;
      max-height: 200px;
      overflow-y: auto;
      color: #ff6b6b;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-left: 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .coverage-section {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin: 30px 0;
      border: 1px solid #333;
    }
    .coverage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .coverage-item {
      text-align: center;
    }
    .coverage-circle {
      width: 100px;
      height: 100px;
      margin: 0 auto 10px;
      position: relative;
    }
    .coverage-circle svg {
      transform: rotate(-90deg);
    }
    .coverage-percentage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5em;
      font-weight: bold;
    }
    .run-single {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
      border: 1px solid #667eea;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 0.8em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .run-single:hover {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Construction BE Test Suite</h1>
    <p class="subtitle">Real-time Interactive Testing Dashboard</p>
  </header>
  
  <div class="container">
    <div class="controls">
      <button onclick="runAllTests()" id="runAllBtn">
        <span>Run All Tests</span>
      </button>
      <button onclick="runFailedTests()" id="runFailedBtn">
        <span>Run Failed Tests</span>
      </button>
      <button onclick="runWithCoverage()">
        <span>Run with Coverage</span>
      </button>
      <button onclick="clearResults()">
        <span>Clear Results</span>
      </button>
      <button onclick="exportResults()">
        <span>Export Results</span>
      </button>
      <div class="status" id="globalStatus">Ready to test</div>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progressBar" style="width: 0%">0%</div>
    </div>
    
    <div class="summary" id="summary">
      <div class="summary-item">
        <h4>Total Tests</h4>
        <div class="count" id="totalCount">0</div>
      </div>
      <div class="summary-item">
        <h4>Passed</h4>
        <div class="count" id="passedCount" style="color: #27ae60;">0</div>
      </div>
      <div class="summary-item">
        <h4>Failed</h4>
        <div class="count" id="failedCount" style="color: #e74c3c;">0</div>
      </div>
      <div class="summary-item">
        <h4>Skipped</h4>
        <div class="count" id="skippedCount" style="color: #95a5a6;">0</div>
      </div>
      <div class="summary-item">
        <h4>Duration</h4>
        <div class="count" id="duration">0s</div>
      </div>
    </div>
    
    <div class="coverage-section" id="coverageSection" style="display: none;">
      <h2 style="margin-bottom: 20px;">Code Coverage</h2>
      <div class="coverage-grid" id="coverageGrid">
        <div class="coverage-item">
          <div class="coverage-circle">
            <svg width="100" height="100">
              <circle cx="50" cy="50" r="40" stroke="#333" stroke-width="8" fill="none"/>
              <circle cx="50" cy="50" r="40" stroke="#667eea" stroke-width="8" fill="none"
                      stroke-dasharray="251.2" stroke-dashoffset="0" id="statementsCoverage"/>
            </svg>
            <div class="coverage-percentage" id="statementsPercentage">0%</div>
          </div>
          <h4>Statements</h4>
        </div>
        <div class="coverage-item">
          <div class="coverage-circle">
            <svg width="100" height="100">
              <circle cx="50" cy="50" r="40" stroke="#333" stroke-width="8" fill="none"/>
              <circle cx="50" cy="50" r="40" stroke="#764ba2" stroke-width="8" fill="none"
                      stroke-dasharray="251.2" stroke-dashoffset="0" id="branchesCoverage"/>
            </svg>
            <div class="coverage-percentage" id="branchesPercentage">0%</div>
          </div>
          <h4>Branches</h4>
        </div>
        <div class="coverage-item">
          <div class="coverage-circle">
            <svg width="100" height="100">
              <circle cx="50" cy="50" r="40" stroke="#333" stroke-width="8" fill="none"/>
              <circle cx="50" cy="50" r="40" stroke="#9b59b6" stroke-width="8" fill="none"
                      stroke-dasharray="251.2" stroke-dashoffset="0" id="functionsCoverage"/>
            </svg>
            <div class="coverage-percentage" id="functionsPercentage">0%</div>
          </div>
          <h4>Functions</h4>
        </div>
        <div class="coverage-item">
          <div class="coverage-circle">
            <svg width="100" height="100">
              <circle cx="50" cy="50" r="40" stroke="#333" stroke-width="8" fill="none"/>
              <circle cx="50" cy="50" r="40" stroke="#e74c3c" stroke-width="8" fill="none"
                      stroke-dasharray="251.2" stroke-dashoffset="0" id="linesCoverage"/>
            </svg>
            <div class="coverage-percentage" id="linesPercentage">0%</div>
          </div>
          <h4>Lines</h4>
        </div>
      </div>
    </div>
    
    <div class="filter-section">
      <input type="text" id="filterInput" placeholder="🔍 Filter tests by name..." onkeyup="filterTests()">
      <div style="margin-top: 10px; color: #999; font-size: 0.9em;">
        Showing <span id="visibleCount">0</span> of <span id="totalTestCount">0</span> tests
      </div>
    </div>
    
    <div class="tests-grid" id="testsGrid">
      <!-- Tests will be dynamically loaded here -->
    </div>
  </div>
  
  <script>
    let testResults = {};
    let startTime;
    let isRunning = false;
    
    // Helper function to escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Initialize dashboard
    async function init() {
      try {
        // Get list of test files from API
        const response = await fetch('/api/tests');
        let tests = [];
        
        if (response.ok) {
          tests = await response.json();
        }
        
        // If no tests found, use default list
        if (tests.length === 0) {
          tests = [
            'architect_drawings', 'architect_measurements_doors', 'architect_measurements_electrical',
            'architect_measurements_flooring', 'architect_measurements_painting', 'architect_measurements_plumbing',
            'architect_measurements_structural', 'architect_measurements_windows', 'architect_project_drawing',
            'architect', 'architect_walls_measurement', 'assign_to_project', 'blocks', 'cities', 'clients',
            'client_choices', 'client_project_approval', 'client_quotations', 'client_quotation_history',
            'client_requirements', 'components', 'doors', 'elements', 'employees', 'enquiries', 'items',
            'leads', 'meetings', 'packages', 'phases', 'projects', 'roles', 'states', 'units', 'users',
            'vendors', 'windows'
          ];
        }
        
        renderTestCards(tests);
        updateTotalCount(tests.length);
      } catch (error) {
        console.error('Failed to initialize dashboard:', error);
        // Show error message
        document.getElementById('globalStatus').textContent = 'Error loading tests';
      }
    }
    
    function renderTestCards(tests) {
      const grid = document.getElementById('testsGrid');
      grid.innerHTML = tests.map(test => `
        <div class="test-card" data-test="${test}">
          <button class="run-single" onclick="runSingleTest('${test}')">Run</button>
          <h3>${test.replace(/_/g, ' ').replace(/route/g, '').trim()}</h3>
          <div class="test-status status-pending">Pending</div>
          <div class="test-details"></div>
        </div>
      `).join('');
      
      // Update counts
      document.getElementById('totalTestCount').textContent = tests.length;
      document.getElementById('visibleCount').textContent = tests.length;
    }
    
    function updateTotalCount(count) {
      document.getElementById('totalCount').textContent = count;
      document.getElementById('totalTestCount').textContent = count;
    }
    
    async function runSingleTest(testName) {
      if (isRunning) return;
      
      const card = document.querySelector(`[data-test="${testName}"]`);
      const statusEl = card.querySelector('.test-status');
      const detailsEl = card.querySelector('.test-details');
      
      statusEl.className = 'test-status status-running';
      statusEl.innerHTML = 'Running... <div class="spinner"></div>';
      detailsEl.innerHTML = '';
      
      try {
        const response = await fetch(`http://localhost:3002/api/test/${testName}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        if (response.ok) {
          const result = await response.json();
          
          if (result.success) {
            statusEl.className = 'test-status status-passed';
            statusEl.textContent = 'Passed';
            detailsEl.innerHTML = `✓ ${result.numPassedTests} tests passed in ${(result.duration/1000).toFixed(2)}s`;
            testResults[testName] = { status: 'passed', ...result };
          } else {
            statusEl.className = 'test-status status-failed';
            statusEl.textContent = 'Failed';
            detailsEl.innerHTML = `
              <div>✗ ${result.numFailedTests} of ${result.numTotalTests} tests failed</div>
              ${result.errorDetails ? `<div class="error-details">${escapeHtml(result.errorDetails).substring(0, 200)}...</div>` : ''}
              ${result.testResults?.[0]?.message ? `<div class="error-details">${escapeHtml(result.testResults[0].message)}</div>` : ''}
            `;
            testResults[testName] = { status: 'failed', ...result };
          }
        } else {
          throw new Error('Test execution failed');
        }
      } catch (error) {
        statusEl.className = 'test-status status-failed';
        statusEl.textContent = 'Error';
        detailsEl.innerHTML = `<div class="error-details">${error.message}</div>`;
        testResults[testName] = { status: 'failed', error: error.message };
      }
      
      updateSummary();
    }
    
    async function runAllTests() {
      if (isRunning) return;
      
      isRunning = true;
      startTime = Date.now();
      document.getElementById('globalStatus').innerHTML = 'Running all tests... <div class="spinner"></div>';
      document.getElementById('runAllBtn').disabled = true;
      document.getElementById('runFailedBtn').disabled = true;
      testResults = {};
      
      const cards = document.querySelectorAll('.test-card');
      const total = cards.length;
      
      for (let i = 0; i < cards.length; i++) {
        const testName = cards[i].dataset.test;
        await runSingleTest(testName);
        updateProgress(i + 1, total);
      }
      
      document.getElementById('globalStatus').textContent = '✓ All tests completed';
      document.getElementById('runAllBtn').disabled = false;
      document.getElementById('runFailedBtn').disabled = false;
      isRunning = false;
    }
    
    async function runFailedTests() {
      const failedTests = Object.entries(testResults)
        .filter(([_, result]) => result.status === 'failed')
        .map(([name, _]) => name);
      
      if (failedTests.length === 0) {
        alert('No failed tests to run');
        return;
      }
      
      isRunning = true;
      startTime = Date.now();
      document.getElementById('globalStatus').innerHTML = 'Running failed tests... <div class="spinner"></div>';
      document.getElementById('runAllBtn').disabled = true;
      document.getElementById('runFailedBtn').disabled = true;
      
      for (let i = 0; i < failedTests.length; i++) {
        await runSingleTest(failedTests[i]);
        updateProgress(i + 1, failedTests.length);
      }
      
      document.getElementById('globalStatus').textContent = '✓ Failed tests completed';
      document.getElementById('runAllBtn').disabled = false;
      document.getElementById('runFailedBtn').disabled = false;
      isRunning = false;
    }
    
    async function runWithCoverage() {
      if (isRunning) return;
      
      alert('Running tests with coverage... This will open a new terminal window.');
      
      // In a real implementation, this would trigger coverage collection
      // For now, we'll simulate it
      setTimeout(async () => {
        try {
          const response = await fetch('http://localhost:3002/api/coverage');
          if (response.ok) {
            const coverage = await response.json();
            displayCoverage(coverage);
          }
        } catch (error) {
          console.error('Failed to load coverage:', error);
        }
      }, 2000);
    }
    
    function displayCoverage(coverage) {
      document.getElementById('coverageSection').style.display = 'block';
      
      // Update coverage circles
      const total = coverage.total || {};
      updateCoverageCircle('statements', total.statements?.pct || 0);
      updateCoverageCircle('branches', total.branches?.pct || 0);
      updateCoverageCircle('functions', total.functions?.pct || 0);
      updateCoverageCircle('lines', total.lines?.pct || 0);
    }
    
    function updateCoverageCircle(type, percentage) {
      const circle = document.getElementById(`${type}Coverage`);
      const text = document.getElementById(`${type}Percentage`);
      const circumference = 2 * Math.PI * 40;
      const offset = circumference - (percentage / 100) * circumference;
      
      circle.style.strokeDashoffset = offset;
      text.textContent = `${percentage.toFixed(1)}%`;
    }
    
    function updateProgress(current, total) {
      const percentage = Math.round((current / total) * 100);
      const progressBar = document.getElementById('progressBar');
      progressBar.style.width = percentage + '%';
      progressBar.textContent = percentage + '%';
    }
    
    function updateSummary() {
      const results = Object.values(testResults);
      const passed = results.filter(r => r.status === 'passed').length;
      const failed = results.filter(r => r.status === 'failed').length;
      const total = results.length;
      const duration = startTime ? ((Date.now() - startTime) / 1000).toFixed(1) : '0';
      
      document.getElementById('passedCount').textContent = passed;
      document.getElementById('failedCount').textContent = failed;
      document.getElementById('skippedCount').textContent = document.querySelectorAll('.test-card').length - total;
      document.getElementById('duration').textContent = duration + 's';
    }
    
    function clearResults() {
      testResults = {};
      document.querySelectorAll('.test-card').forEach(card => {
        card.querySelector('.test-status').className = 'test-status status-pending';
        card.querySelector('.test-status').textContent = 'Pending';
        card.querySelector('.test-details').innerHTML = '';
      });
      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('progressBar').textContent = '0%';
      document.getElementById('globalStatus').textContent = 'Ready to test';
      document.getElementById('coverageSection').style.display = 'none';
      updateSummary();
    }
    
    function exportResults() {
      const results = {
        timestamp: new Date().toISOString(),
        summary: {
          total: document.querySelectorAll('.test-card').length,
          passed: Object.values(testResults).filter(r => r.status === 'passed').length,
          failed: Object.values(testResults).filter(r => r.status === 'failed').length,
          skipped: document.querySelectorAll('.test-card').length - Object.keys(testResults).length,
          duration: document.getElementById('duration').textContent
        },
        details: testResults
      };
      
      const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `test-results-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    }
    
    function filterTests() {
      const filter = document.getElementById('filterInput').value.toLowerCase();
      let visibleCount = 0;
      
      document.querySelectorAll('.test-card').forEach(card => {
        const testName = card.dataset.test.toLowerCase();
        const isVisible = testName.includes(filter);
        card.style.display = isVisible ? 'block' : 'none';
        if (isVisible) visibleCount++;
      });
      
      document.getElementById('visibleCount').textContent = visibleCount;
    }
    
    // Initialize on load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
