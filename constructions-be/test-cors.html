<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>
    <h1>CORS Test</h1>
    <button onclick="testHealth()">Test Health Endpoint</button>
    <button onclick="testLogin()">Test Login Endpoint</button>
    <div id="result"></div>

    <script>
        const API_URL = 'http://localhost:8080';
        const resultDiv = document.getElementById('result');

        async function testHealth() {
            resultDiv.innerHTML = 'Testing health endpoint...';
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                resultDiv.innerHTML = `<pre>Health Check Success:\n${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre style="color: red;">Error:\n${error.message}</pre>`;
            }
        }

        async function testLogin() {
            resultDiv.innerHTML = 'Testing login endpoint...';
            try {
                const response = await fetch(`${API_URL}/api/user-sessions/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        // Add your login credentials here
                        username: 'test@example.com',
                        password: 'test123'
                    })
                });
                
                const contentType = response.headers.get('content-type');
                let data;
                
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    data = await response.text();
                }
                
                resultDiv.innerHTML = `<pre>Login Response (${response.status}):\n${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre style="color: red;">Error:\n${error.message}\n${error.stack}</pre>`;
            }
        }
    </script>
</body>
</html>
